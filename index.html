<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feed The Monster</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(180deg,#12051f,#090013);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:1200px;
    max-width:95%;
    display:flex;
    gap:40px;
    align-items:center;
}

.left{
    width:40%;
}

.right{
    width:60%;
    display:flex;
    justify-content:center;
}

h1{
    font-size:4rem;
    color:#d8a7ff;
    margin-bottom:10px;
}

.subtitle{
    color:#c7a8ff;
    margin-bottom:30px;
    font-size:1.2rem;
}

textarea{
    width:100%;
    height:180px;
    background:#1f1033;
    border:2px solid #6d2cff;
    color:white;
    border-radius:15px;
    padding:15px;
    resize:none;
    font-size:1rem;
}

button{
    margin-top:15px;
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:#7b2fff;
    color:white;
    font-size:1.2rem;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.03);
}

.monster{
    position:relative;
    width:500px;
    height:500px;
    background:#7b2fff;
    border-radius:50%;
    transition:.5s;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.eyes{
    display:flex;
    gap:80px;
    margin-top:-50px;
}

.eye{
    width:60px;
    height:60px;
    background:black;
    border-radius:50%;
}

.mouth{
    margin-top:40px;
    width:250px;
    height:120px;
    background:black;
    border-radius:0 0 150px 150px;
    overflow:hidden;
    transition:.5s;
}

.thought{
    position:absolute;
    background:white;
    color:black;
    padding:12px;
    border-radius:10px;
    max-width:250px;
    top:100px;
    left:-250px;
    opacity:0;
}

.eating{
    animation:eat 2s forwards;
}

@keyframes eat{
    0%{
        left:-250px;
        opacity:1;
    }

    100%{
        left:210px;
        top:220px;
        opacity:0;
        transform:scale(.1);
    }
}

.message{
    margin-top:20px;
    color:#b9ffb5;
    font-size:1.1rem;
}

.counter{
    margin-top:20px;
    color:#d5baff;
}

.history{
    margin-top:25px;
}

.history h3{
    margin-bottom:10px;
}

.history-item{
    background:#1f1033;
    margin-bottom:8px;
    padding:10px;
    border-radius:10px;
}
</style>
</head>
<body>

<div class="container">

<div class="left">
<h1>Feed Your Bad Thoughts</h1>

<p class="subtitle">
Write it down. Let it go. The monster will eat it.
</p>

<textarea
id="thoughtInput"
placeholder="Write a bad thought here..."></textarea>

<button onclick="feedMonster()">
FEED THE MONSTER
</button>

<div class="message" id="message"></div>

<div class="counter">
Thoughts Eaten:
<span id="count">0</span>
</div>

<div class="history">
<h3>Recently Eaten</h3>
<div id="history"></div>
</div>

</div>

<div class="right">

<div class="monster" id="monster">

<div class="eyes">
<div class="eye"></div>
<div class="eye"></div>
</div>

<div class="mouth" id="mouth"></div>

<div class="thought" id="thoughtBubble"></div>

</div>

</div>

</div>

<script>

let totalEaten = 0;

const responses = [
"That thought is gone.",
"You don't need to carry that anymore.",
"The monster took care of it.",
"One less burden today.",
"Let it go and keep moving.",
"You are stronger than that thought."
];

function feedMonster(){

const input =
document.getElementById("thoughtInput");

const thought =
document.getElementById("thoughtBubble");

const mouth =
document.getElementById("mouth");

const message =
document.getElementById("message");

const history =
document.getElementById("history");

if(input.value.trim()===""){
    alert("Write something first!");
    return;
}

thought.textContent = input.value;
thought.classList.remove("eating");

void thought.offsetWidth;

thought.style.opacity = "1";
thought.classList.add("eating");

mouth.style.height = "180px";

setTimeout(()=>{

    mouth.style.height = "120px";

    totalEaten++;
    document.getElementById("count").textContent =
    totalEaten;

    const item =
    document.createElement("div");

    item.className = "history-item";
    item.textContent = input.value;

    history.prepend(item);

    message.textContent =
    responses[
    Math.floor(Math.random()*responses.length)
    ];

    input.value = "";

},2000);
}
</script>

</body>
</html>
