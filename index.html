<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport"
content="width=device-width, initial-scale=1.0"> <title>Purple Monster</title>
<style> *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
body{ background:#12051f; color:white; min-height:100vh; display:flex; justify-content:center; alignitems:center; padding:20px; }
.container{ width:1200px; max-width:100%; display:flex; gap:40px; }
.left{ width:40%; }
.right{ width:60%; display:flex; justify-content:center; align-items:center; }
h1{ font-size:3.5rem; color:#c88cff; margin-bottom:10px; }
.subtitle{ margin-bottom:20px; color:#d9b8ff; }
textarea{ width:100%; height:180px; background:#1f1033; border:2px solid #7a30ff; border-radius:15px;
padding:15px; color:white; font-size:1rem; resize:none; }
button{ width:100%; padding:15px; margin-top:15px; background:#7a30ff; border:none; border-radius:
15px; font-size:1.1rem; color:white; cursor:pointer; }
button:hover{ opacity:.9; }
.monster{ width:450px; height:450px; background:#7a30ff; border-radius:50%; position:relative;
display:flex; flex-direction:column; align-items:center; justify-content:center; }
.eyes{ display:flex; gap:70px; margin-bottom:40px; }
.eye{ width:55px; height:55px; background:black; border-radius:50%; }
.mouth{ width:220px; height:120px; background:black; border-radius:0 0 120px 120px; transition:.4s; }
.thought{ position:absolute; left:-220px; top:120px; background:white; color:black; padding:10px; borderradius:10px; opacity:0; }
.eat{ animation:eat 2s forwards; }
@keyframes eat{ 0%{ left:-220px; opacity:1; } 100%{ left:180px; top:220px; opacity:0; transform:scale(.1); } }
.responseBox{ margin-top:20px; background:#1f1033; padding:15px; border-radius:15px; min-height:
80px; }
    .memory{ margin-top:20px; }
.memoryItem{ background:#24103f; padding:10px; border-radius:10px; margin-bottom:8px; } </style> </
head>
<body>
<div class="container">
<div class="left">
<h1>Feed The Monster</h1>
<p class="subtitle"> Write a negative thought and let the monster eat it. The monster only remembers
positive things. </p>
<textarea id="thoughtInput" placeholder="Write your thought here..."></textarea>
<button onclick="feedMonster()"> FEED THE MONSTER </button>
<div class="responseBox" id="responseBox"> The monster is waiting... </div>
<div class="memory"> <h3>Monster Memories</h3> <div id="memoryList"></div> </div>
</div>
<div class="right">
<div class="monster">
<div class="eyes"> <div class="eye"></div> <div class="eye"></div> </div>
<div class="mouth" id="mouth"></div>
<div class="thought" id="thoughtBubble"></div>
</div>
</div>
</div>
<script>
const responses = [
"That sounds difficult. You deserve kindness.",
"You're carrying a lot right now. Be patient with yourself.",
"Bad moments do not define who you are.",
"You are allowed to make mistakes and keep growing.",
"Take one step at a time. That's enough.",
"You matter even on difficult days.",
"You deserve support and understanding.",
"Progress can be small and still count.",
"You've made it through hard days before.",
"Your value is not measured by one thought.",
"It's okay to rest and try again later.",
"Keep going. You are stronger than you think.",
"You deserve compassion, including from yourself.",
"Today doesn't decide your whole future.",
"There is more to you than your worries."
];
function loadMemories(){
const memoryList = document.getElementById("memoryList");
const memories = JSON.parse( localStorage.getItem("monsterMemories") ) || [];
memoryList.innerHTML="";
memories.forEach(item=>{
const div = document.createElement("div");
div.className="memoryItem"; div.textContent=item;
    memoryList.appendChild(div);
});
}
function feedMonster(){
const input = document.getElementById("thoughtInput");
const thought = document.getElementById("thoughtBubble");
const mouth = document.getElementById("mouth");
const responseBox = document.getElementById("responseBox");
if(input.value.trim()===""){ alert("Write something first!"); return; }
thought.textContent=input.value;
thought.classList.remove("eat"); void thought.offsetWidth; thought.classList.add("eat");
mouth.style.height="180px";
setTimeout(()=>{
mouth.style.height="120px";
const response = responses[ Math.floor( Math.random()*responses.length ) ];
responseBox.textContent=response;
let memories = JSON.parse( localStorage.getItem("monsterMemories") ) || [];
memories.unshift(response);
if(memories.length>20){ memories=memories.slice(0,20); }
localStorage.setItem( "monsterMemories", JSON.stringify(memories) );
loadMemories();
input.value="";
thought.textContent="";
    },2000);
}
loadMemories();
</script>
</body> </html>
